components:
  schemas:
    AdminResetPasswordRequest:
      type: object
      properties:
        new_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - new_password
    AuthenticationError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: authentication_error
            message:
              type: string
              example: Authentication credentials were not valid.
            request_id:
              type: string
              nullable: true
          required:
          - code
          - message
    BlankEnum:
      enum:
      - ''
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - current_password
      - new_password
      - new_password_confirm
    ChangePasswordResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ClaimCoverageTypeEnum:
      enum:
      - own_damage
      - civil_liability
      type: string
      description: |-
        * `own_damage` - Own damage
        * `civil_liability` - Civil liability
    ClaimCreateRequest:
      type: object
      properties:
        insured_customer:
          type: integer
        vehicle:
          type: integer
        policy_vehicle:
          type: integer
          nullable: true
        workshop:
          type: integer
          nullable: true
        insurer:
          type: integer
        claim_date:
          type: string
          format: date
        documentation_date:
          type: string
          format: date
          nullable: true
        repair_authorization_date:
          type: string
          format: date
          nullable: true
        estimated_departure_date:
          type: string
          format: date
          nullable: true
        payment_date:
          type: string
          format: date
          nullable: true
        damage_type:
          $ref: '#/components/schemas/DamageTypeEnum'
        coverage_type:
          oneOf:
          - $ref: '#/components/schemas/ClaimCoverageTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        payment_type:
          oneOf:
          - $ref: '#/components/schemas/PaymentTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        claim_description:
          type: string
          minLength: 1
          maxLength: 300
        vehicle_driver:
          type: string
          maxLength: 100
        insurer_executive:
          type: string
          maxLength: 100
        insurer_executive_phone:
          type: string
          maxLength: 10
        claim_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        adjusted_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        delivery_status_confirmation:
          type: string
          maxLength: 200
        documents:
          type: array
          items:
            $ref: '#/components/schemas/ClaimDocumentCreateRequest'
      required:
      - claim_date
      - claim_description
      - insured_customer
      - insurer
      - vehicle
    ClaimDocumentCreateRequest:
      type: object
      properties:
        document_type:
          $ref: '#/components/schemas/ClaimDocumentDocumentTypeEnum'
        delivered:
          type: boolean
        file:
          type: string
          format: binary
          nullable: true
        observation:
          type: string
          maxLength: 200
        delivery_date:
          type: string
          format: date
          nullable: true
      required:
      - document_type
    ClaimDocumentDocumentTypeEnum:
      enum:
      - id_card
      - license
      - registration
      - form
      - estimate
      - other
      type: string
      description: |-
        * `id_card` - ID card
        * `license` - License
        * `registration` - Registration
        * `form` - Form
        * `estimate` - Estimate
        * `other` - Other
    ClaimDocumentRead:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        claim:
          type: integer
        document_type:
          $ref: '#/components/schemas/ClaimDocumentDocumentTypeEnum'
        delivered:
          type: boolean
        file:
          type: string
          format: uri
          nullable: true
        observation:
          type: string
          maxLength: 200
        delivery_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - claim
      - created_at
      - document_type
      - id
      - updated_at
    ClaimDocumentReadRequest:
      type: object
      properties:
        claim:
          type: integer
        document_type:
          $ref: '#/components/schemas/ClaimDocumentDocumentTypeEnum'
        delivered:
          type: boolean
        file:
          type: string
          format: binary
          nullable: true
        observation:
          type: string
          maxLength: 200
        delivery_date:
          type: string
          format: date
          nullable: true
      required:
      - claim
      - document_type
    ClaimInsurerSummary:
      type: object
      properties:
        id:
          type: integer
        insurer_code:
          type: string
        name:
          type: string
        claims_executive_name:
          type: string
        claims_executive_phone:
          type: string
        claims_executive_email:
          type: string
          format: email
      required:
      - claims_executive_email
      - claims_executive_name
      - claims_executive_phone
      - id
      - insurer_code
      - name
    ClaimInsurerSummaryRequest:
      type: object
      properties:
        id:
          type: integer
        insurer_code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        claims_executive_name:
          type: string
          minLength: 1
        claims_executive_phone:
          type: string
          minLength: 1
        claims_executive_email:
          type: string
          format: email
          minLength: 1
      required:
      - claims_executive_email
      - claims_executive_name
      - claims_executive_phone
      - id
      - insurer_code
      - name
    ClaimPolicyVehicleSummary:
      type: object
      properties:
        id:
          type: integer
        vehicle_number:
          type: integer
        insured_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        product:
          type: string
        general_coverage:
          type: string
        policy_number:
          type: string
          readOnly: true
        annex_number:
          type: string
          readOnly: true
      required:
      - annex_number
      - general_coverage
      - id
      - insured_value
      - policy_number
      - product
      - vehicle_number
    ClaimPolicyVehicleSummaryRequest:
      type: object
      properties:
        id:
          type: integer
        vehicle_number:
          type: integer
        insured_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        product:
          type: string
          minLength: 1
        general_coverage:
          type: string
          minLength: 1
      required:
      - general_coverage
      - id
      - insured_value
      - product
      - vehicle_number
    ClaimRead:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        insured_customer:
          type: integer
        vehicle:
          type: integer
        policy_vehicle:
          type: integer
          nullable: true
        workshop:
          type: integer
          nullable: true
        insurer:
          type: integer
        claim_number:
          type: string
          maxLength: 20
        claim_date:
          type: string
          format: date
        broker_report_date:
          type: string
          format: date
