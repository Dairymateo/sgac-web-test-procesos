openapi: 3.0.3
info:
  title: SGAC API
  version: 1.0.0
  description: SGAC backend API documentation
paths:
  /api/auth/change-password/:
    post:
      operationId: auth_change_password
      description: Allows the authenticated user to change their password.
      tags:
      - authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
          description: ''
        '400':
          $ref: '#/components/schemas/ValidationError'
        '401':
          $ref: '#/components/schemas/AuthenticationError'
        '403':
          $ref: '#/components/schemas/PermissionDenied'
  /api/auth/login/:
    post:
      operationId: auth_login
      description: Logs in and returns JWT tokens together with the authenticated
        user.
      tags:
      - authentication
      requestBody:
