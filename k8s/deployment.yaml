apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgac-web-test
  labels:
    app: sgac-web-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sgac-web-test
  template:
    metadata:
      labels:
        app: sgac-web-test
    spec:
      containers:
      - name: sgac-web-test
        image: dairymateo/sgac-web-test:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
