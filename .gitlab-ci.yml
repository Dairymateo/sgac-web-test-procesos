workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - test
  - sonar
  - deploy

variables:
  NODE_IMAGE: node:20
  GIT_DEPTH: 1
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

default:
  cache:
    key: "$CI_COMMIT_REF_SLUG-npm"
    paths:
      - .npm/

lint:
  stage: test
  image: $NODE_IMAGE
  script:
    - npm install
    - npx eslint src/ --no-error-on-unmatched-pattern || echo "Lint completado con advertencias"
  only:
    - merge_requests
    - main
    - develop
    - testing

security-audit:
  stage: test
  image: $NODE_IMAGE
  script:
    - npm install
    - npm audit --audit-level=critical || echo "Vulnerabilidades ignoradas"
    - echo "Auditoria de seguridad completada"
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop
    - testing

test-unit:
  stage: test
  image: $NODE_IMAGE
  script:
    - npm install
    - npm run test:unit
  only:
    - merge_requests
    - main
    - develop
    - testing

test-integration:
  stage: test
  image: $NODE_IMAGE
  script:
    - npm install
    - echo "VITE_API_URL=${VITE_API_URL}" > .env
    - npm run build
    - npm run test:integration
  only:
    - merge_requests
    - main
    - develop
    - testing

test-coverage:
  stage: test
  image: $NODE_IMAGE
  script:
    - npm install
    - echo "VITE_API_URL=${VITE_API_URL}" > .env
    - npm run build
    - npm run coverage
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    paths:
      - coverage/
      - dist/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  only:
    - merge_requests
    - main
    - develop
    - testing

bundle-size:
  stage: test
  image: $NODE_IMAGE
  script:
    - npm install
    - echo "VITE_API_URL=${VITE_API_URL}" > .env
    - npm run build
    - echo "=== Analisis de Bundle ==="
    - >-
      node -e "
      const fs = require('fs');
      const path = require('path');
      function dirSize(dir) {
        let total = 0;
        for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
          const full = path.join(dir, entry.name);
          total += entry.isDirectory() ? dirSize(full) : fs.statSync(full).size;
        }
        return total;
      }
      const totalKB = (dirSize('dist') / 1024).toFixed(2);
      console.log('Total dist: ' + totalKB + ' KB');
      console.log('--- Detalle de assets ---');
      let jsSize = 0, cssSize = 0;
      fs.readdirSync('dist/assets').forEach(f => {
        const size = fs.statSync(path.join('dist/assets', f)).size;
        console.log(f + ' -> ' + (size / 1024).toFixed(2) + ' KB');
        if (f.endsWith('.js')) jsSize += size;
        if (f.endsWith('.css')) cssSize += size;
      });
      console.log('JS total: ' + (jsSize / 1024).toFixed(2) + ' KB');
      console.log('CSS total: ' + (cssSize / 1024).toFixed(2) + ' KB');
      "
  only:
    - merge_requests
    - main
    - testing

sonar-scan:
  stage: sonar
  image: $NODE_IMAGE
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
      - .npm/
  script:
    - npm install
    - npx sonarqube-scanner -D "sonar.projectKey=sgac-frontend" -D "sonar.organization=${SONAR_ORGANIZATION}" -D "sonar.host.url=${SONAR_HOST_URL}" -D "sonar.token=${SONAR_TOKEN}" -D "sonar.javascript.lcov.reportPaths=coverage/lcov.info"
  dependencies:
    - test-coverage
  only:
    - merge_requests
    - main
    - develop
    - testing

deploy-prod:
  stage: deploy
  image: $NODE_IMAGE
  script:
    - echo "Desplegando en RENDER (PRODUCCION)..."
    - curl -sf -X POST "${RENDER_DEPLOY_HOOK_PROD}" || echo "Deploy hook no configurado"
    - echo "Deploy hook disparado exitosamente"
  dependencies:
    - test-coverage
  only:
    - main
  environment:
    name: production
    url: https://sgac-web-prod.onrender.com

deploy-testing:
  stage: deploy
  image: $NODE_IMAGE
  script:
    - echo "Desplegando en RENDER (TESTING)..."
    - curl -sf -X POST "${RENDER_DEPLOY_HOOK_TESTING}" || echo "Deploy hook no configurado"
    - echo "Deploy hook disparado exitosamente"
  dependencies:
    - test-coverage
  only:
    - testing
  environment:
    name: testing
    url: https://sgac-web.onrender.com
