sonar.projectKey=tesis-front-testing
sonar.projectName=Tesis Frontend (Testing)
sonar.projectVersion=1.0

# Directorios fuente
sonar.sources=src
sonar.exclusions=**/*.test.tsx,**/*.test.ts,src/test/**,node_modules/**,dist/**
sonar.coverage.exclusions=src/main.tsx,src/App.tsx,src/tests/setup.ts,src/types/**,**/*.d.ts
# Cobertura generada por Vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Idioma
sonar.sourceEncoding=UTF-8